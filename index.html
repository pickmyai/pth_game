<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流行曲拼音遊戲 | Pop Song Pinyin Game</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="main-layout">
        <aside id="history-sidebar" class="history-sidebar card hidden">
            <h3>歷史紀錄</h3>
            <div id="history-list" class="history-list">
                <!-- Records will be injected here -->
            </div>
        </aside>

        <div class="container" id="game-container">
            <header>
                <h1>流行曲拼音遊戲</h1>
                <p>聽旋律，選拼音</p>
            </header>

            <div id="start-screen" class="card fade-in">
                <h2>準備好挑戰了嗎？</h2>
                <p>通過流行歌曲歌詞學習普通話拼音</p>
                <button id="start-btn" class="primary-btn">進入遊戲</button>
            </div>

            <div id="game-screen" class="card hidden">
                <div class="game-header">
                    <button id="prev-btn" class="nav-btn" title="上一題">←</button>
                    <div class="level-info">第 <span id="current-song-num">1</span> / <span id="total-song-num">10</span>
                        首</div>
                    <div class="score-info">得分: <span id="score">0</span></div>
                    <button id="next-btn" class="nav-btn" title="下一題">→</button>
                </div>

                <div class="song-info">
                    <h3 id="song-title">歌曲標題</h3>
                    <p id="song-artist">歌手</p>
                </div>

                <div class="lyrics-container">
                    <p id="lyrics-display">歌詞加載中...</p>
                </div>

                <div class="input-display-container">
                    <p>請填充 <span id="target-text" class="highlight">「...」</span> 的聲母與韻母：</p>
                    <div class="input-slots">
                        <div class="slot-box">
                            <span class="slot-label">聲母</span>
                            <div id="initial-slot" class="slot placeholder">?</div>
                        </div>
                        <div class="slot-box">
                            <span class="slot-label">韻母</span>
                            <div id="final-slot" class="slot placeholder">?</div>
                        </div>
                    </div>
                </div>

                <div class="keyboard-controls">
                    <div class="tabs">
                        <button id="tab-initial" class="tab-btn active">聲母表</button>
                        <button id="tab-final" class="tab-btn">韻母表</button>
                    </div>
                    <div id="keyboard-grid" class="keyboard-grid">
                        <!-- Keys will be injected here -->
                    </div>
                    <button id="submit-btn" class="primary-btn hidden">提交答案</button>
                </div>

                <div id="feedback" class="feedback-msg hidden"></div>
            </div>

            <div id="end-screen" class="card hidden">
                <h2>遊戲結束</h2>
                <div class="final-score-display">
                    <p>最終得分</p>
                    <div id="final-score">0</div>
                </div>
                <p id="score-comment"></p>
                <button id="restart-btn" class="secondary-btn">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
